<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mnemosyne — account</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.6 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 520px; margin: 0 auto; padding: 3rem 1.5rem; }
    a { color: #c9a86a; text-decoration: none; }
    h1 { font-weight: 300; margin: 0 0 1rem; }
    .card { border: 1px solid #2a2622; border-radius: 10px; padding: 1.2rem; margin: 1rem 0; }
    .danger button { background: #2a1814; color: #d99; border: 1px solid #4a3028;
                     border-radius: 8px; padding: .55rem 1rem; cursor: pointer; }
    .error { color: #d99; }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="/albums">&larr; albums</a></p>
    <h1>Account</h1>
    <div class="card">
      <p>{{ user.email }}</p>
      <p><a href="/billing">Billing &amp; subscription</a></p>
    </div>
    <div class="card danger">
      <h2 style="font-size:1rem;margin:0 0 .5rem">Delete account</h2>
      <p style="color:#9b9183;font-size:.9rem">Permanently deletes your account and all albums. Cannot be undone.</p>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="post" action="/account/delete"
            onsubmit="return confirm('Delete your account and every album?');">
        <label style="color:#9b9183;font-size:.85rem">Confirm with your password</label>
        <input type="password" name="password" required
               style="width:100%;box-sizing:border-box;background:#0e0d0c;border:1px solid #3a352e;
                      border-radius:8px;color:#e8e2d8;padding:.6rem;margin:.5rem 0 1rem;">
        <button type="submit">Delete my account</button>
      </form>
    </div>
  </div>
</body>
</html>
