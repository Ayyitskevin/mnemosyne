<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ album.name }}</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
    h1 { font-weight: 300; letter-spacing: .04em; margin: .2rem 0 .4rem; }
    .meta { color: #9b9183; font-size: .85rem; margin-bottom: 2rem; }
    .meta a { color: #d8b25a; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }
    .spread { margin-bottom: 1.8rem; }
    .label { color: #9b9183; font-size: .8rem; letter-spacing: .08em;
             text-transform: uppercase; margin-bottom: .5rem; }
    .pages { display: grid; gap: 5px; aspect-ratio: 16 / 10;
             background: #000; border: 1px solid #221f1b; border-radius: 6px;
             overflow: hidden; position: relative; }
    .pages img { display: block; width: 100%; height: 100%; object-fit: cover;
                 min-width: 0; min-height: 0; }
    .pages::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
                    width: 1px; background: rgba(255, 255, 255, .07);
                    pointer-events: none; }
    .caption { color: #6f675b; font-size: .76rem; margin-top: .5rem;
               display: flex; flex-wrap: wrap; gap: .8rem; }
    .prints { margin: 0 0 2rem; }
    .prints a { display: inline-block; text-decoration: none; background: #c9a86a;
                color: #1a160f; border-radius: 8px; padding: .65rem 1.2rem;
                font-size: .95rem; font-weight: 600; }
    .prints a:hover { background: #d8ba7e; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>{{ album.name }}</h1>
    <div class="meta">
      A shared album &nbsp;·&nbsp;
      <a href="/share/{{ token }}/pdf">download PDF &darr;</a>
    </div>

    {% if plutus_offer_url %}
    <div class="prints">
      <a href="{{ plutus_offer_url }}" target="_blank" rel="noopener noreferrer">{{ plutus_cta }} &rarr;</a>
    </div>
    {% endif %}

    {% for spread in spreads %}
      <div class="spread">
        <div class="label">Spread {{ spread.position }}</div>
        <div class="pages" style="grid-template-columns: {{ spread.layout.cols }};
             grid-template-rows: {{ spread.layout.rows }};
             grid-template-areas: {{ spread.layout.areas | safe }};">
          {% for slot in spread.layout.slots %}
            <img style="grid-area: {{ slot.area }};"
                 src="/share/{{ token }}/photo/{{ slot.photo.id }}"
                 alt="{{ slot.photo.scene }}"
                 title="{{ slot.photo.scene }}">
          {% endfor %}
        </div>
        <div class="caption">
          {% for p in spread.photos %}
            <span>{{ p.scene }}</span>
          {% endfor %}
        </div>
      </div>
    {% endfor %}
  </div>
</body>
</html>
