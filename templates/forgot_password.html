<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mnemosyne — reset password</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.6 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 420px; margin: 0 auto; padding: 4rem 1.5rem; }
    h1 { font-weight: 300; letter-spacing: .04em; font-size: 2rem; margin: 0 0 .4rem; }
    .sub { color: #9b9183; margin: 0 0 2rem; }
    label { display: block; color: #9b9183; font-size: .85rem; margin: 0 0 .35rem; }
    input { width: 100%; box-sizing: border-box; background: #0e0d0c;
        border: 1px solid #3a352e; border-radius: 8px; color: #e8e2d8;
        padding: .75rem .9rem; font-size: 1rem; margin-bottom: 1.1rem; }
    button { width: 100%; background: #c9a86a; color: #1a160f; border: 0;
             border-radius: 8px; padding: .8rem 1.4rem; font-size: 1rem;
             font-weight: 600; cursor: pointer; }
    .notice { color: #9bbf8a; margin: 0 0 1rem; }
    .dev { color: #9b9183; font-size: .82rem; word-break: break-all; margin-top: 1rem; }
    .alt a { color: #c9a86a; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Reset password</h1>
    {% if sent %}
      <p class="notice">If that email is registered, a reset link has been issued.</p>
      {% if dev_link %}<p class="dev">Dogfood link: <a href="{{ dev_link }}">{{ dev_link }}</a></p>{% endif %}
    {% else %}
      <p class="sub">Enter your account email.</p>
      <form method="post" action="/forgot-password">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ email or '' }}" required autofocus>
        <button type="submit">Send reset link</button>
      </form>
    {% endif %}
    <p class="alt"><a href="/login">&larr; back to sign in</a></p>
  </div>
</body>
</html>
