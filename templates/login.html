<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mnemosyne — sign in</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.6 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 420px; margin: 0 auto; padding: 4rem 1.5rem; }
    h1 { font-weight: 300; letter-spacing: .04em; font-size: 2rem; margin: 0 0 .4rem; }
    .sub { color: #9b9183; margin: 0 0 2rem; }
    label { display: block; color: #9b9183; font-size: .85rem; margin: 0 0 .35rem; }
    input { width: 100%; box-sizing: border-box; background: #0e0d0c;
        border: 1px solid #3a352e; border-radius: 8px; color: #e8e2d8;
        padding: .75rem .9rem; font-size: 1rem; margin-bottom: 1.1rem; }
    input:focus { outline: none; border-color: #6b5d49; }
    button { width: 100%; background: #c9a86a; color: #1a160f; border: 0;
             border-radius: 8px; padding: .8rem 1.4rem; font-size: 1rem;
             font-weight: 600; cursor: pointer; }
    button:hover { background: #d8ba7e; }
    .error { color: #d99; margin: 0 0 1.1rem; font-size: .95rem; }
    .alt { color: #9b9183; font-size: .9rem; margin-top: 1.5rem; }
    .alt a { color: #c9a86a; text-decoration: none; }
    .alt a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>mnemosyne</h1>
    <p class="sub">Sign in to your albums.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ email or '' }}"
             required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Sign in</button>
    </form>
    <p class="alt">No account yet? <a href="/signup">Create one</a>.</p>
  </div>
</body>
</html>
