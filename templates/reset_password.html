<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mnemosyne — new password</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.6 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 420px; margin: 0 auto; padding: 4rem 1.5rem; }
    h1 { font-weight: 300; font-size: 2rem; margin: 0 0 1.5rem; }
    label { display: block; color: #9b9183; font-size: .85rem; margin: 0 0 .35rem; }
    input { width: 100%; box-sizing: border-box; background: #0e0d0c;
        border: 1px solid #3a352e; border-radius: 8px; color: #e8e2d8;
        padding: .75rem .9rem; font-size: 1rem; margin-bottom: 1.1rem; }
    button { width: 100%; background: #c9a86a; color: #1a160f; border: 0;
             border-radius: 8px; padding: .8rem 1.4rem; font-weight: 600; cursor: pointer; }
    .error { color: #d99; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Choose a new password</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{ token }}">
      <label for="password">New password</label>
      <input type="password" id="password" name="password" required autofocus>
      <button type="submit">Update password</button>
    </form>
  </div>
</body>
</html>
