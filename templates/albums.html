<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mnemosyne</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 3rem 1.5rem; }
    h1 { font-weight: 300; letter-spacing: .04em; margin: 0 0 .25rem; }
    .sub { color: #9b9183; margin: 0 0 2.5rem; }
    a.album { display: block; text-decoration: none; color: inherit;
              border: 1px solid #2a2622; border-radius: 10px; padding: 1.1rem 1.3rem;
              margin-bottom: .9rem; transition: border-color .15s, background .15s; }
    a.album:hover { border-color: #6b5d49; background: #15130f; }
    .name { font-size: 1.15rem; }
    .meta { color: #9b9183; font-size: .9rem; margin-top: .2rem; }
    .empty { color: #9b9183; border: 1px dashed #2a2622; border-radius: 10px;
             padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>mnemosyne</h1>
    <p class="sub">drafted albums</p>
    {% if albums %}
      {% for a in albums %}
        <a class="album" href="/albums/{{ a.id }}">
          <div class="name">{{ a.name }}</div>
          <div class="meta">{{ a.photo_count }} photos · {{ a.spread_count }} spreads · {{ a.created_at }}</div>
        </a>
      {% endfor %}
    {% else %}
      <div class="empty">No albums yet. Run <code>python -m mnemosyne build &lt;folder&gt;</code>.</div>
    {% endif %}
  </div>
</body>
</html>
