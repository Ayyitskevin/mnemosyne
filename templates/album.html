<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ album.name }} — mnemosyne</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
    a.back { color: #9b9183; text-decoration: none; font-size: .9rem; }
    a.back:hover { color: #e8e2d8; }
    h1 { font-weight: 300; letter-spacing: .04em; margin: .4rem 0 2rem; }
    .spread { margin-bottom: 1.8rem; }
    .label { color: #9b9183; font-size: .8rem; letter-spacing: .08em;
             text-transform: uppercase; margin-bottom: .5rem; }
    /* A spread is two facing pages drawn as one CSS grid; the per-spread track
       sizing + grid-areas come from the layout engine, with a faint centre line
       standing in for the book's spine. */
    .pages { display: grid; gap: 5px; aspect-ratio: 16 / 10;
             background: #000; border: 1px solid #221f1b; border-radius: 6px;
             overflow: hidden; position: relative; }
    .pages img { display: block; width: 100%; height: 100%; object-fit: cover;
                 min-width: 0; min-height: 0; }
    .pages::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
                    width: 1px; background: rgba(255, 255, 255, .07);
                    pointer-events: none; }
    .caption { color: #6f675b; font-size: .76rem; margin-top: .35rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">&larr; all albums</a>
    <h1>{{ album.name }}</h1>

    {% for spread in spreads %}
      <div class="spread">
        <div class="label">Spread {{ spread.position }}</div>
        <div class="pages" style="grid-template-columns: {{ spread.layout.cols }};
             grid-template-rows: {{ spread.layout.rows }};
             grid-template-areas: {{ spread.layout.areas | safe }};">
          {% for slot in spread.layout.slots %}
            <img style="grid-area: {{ slot.area }};"
                 src="/photo/{{ slot.photo.id }}"
                 alt="{{ slot.photo.scene }}"
                 title="{{ slot.photo.scene }} (hero {{ '%.2f'|format(slot.photo.hero_score or 0) }})">
          {% endfor %}
        </div>
        <div class="caption">
          {% for p in spread.photos %}{{ p.scene }}{% if p.is_hero %} ★{% endif %}{% if not loop.last %} · {% endif %}{% endfor %}
        </div>
      </div>
    {% endfor %}
  </div>
</body>
</html>
