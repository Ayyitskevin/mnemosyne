<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delete {{ album.name }} — mnemosyne</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0e0d0c; color: #e8e2d8;
           font: 16px/1.6 -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { max-width: 540px; margin: 0 auto; padding: 5rem 1.5rem; text-align: center; }
    h1 { font-weight: 300; letter-spacing: .04em; font-size: 1.7rem; margin: 0 0 .6rem; }
    .name { color: #cfc6b8; }
    .msg { color: #9b9183; margin: 1.2rem auto 0; max-width: 440px; }
    .actions { margin-top: 2.4rem; display: flex; gap: .8rem; justify-content: center;
               align-items: center; }
    form { margin: 0; }
    button.danger { background: #b4463c; color: #f5ece6; border: 0; border-radius: 8px;
             padding: .65rem 1.3rem; font-size: .95rem; font-weight: 600; cursor: pointer; }
    button.danger:hover { background: #c8554a; }
    a.ghost { color: #9b9183; text-decoration: none; }
    a.ghost:hover { color: #cfc6b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Delete this album?</h1>
    <p class="name">{{ album.name }}</p>
    <p class="msg">This permanently removes the album, its photos, and the laid-out
      spreads. This can't be undone.</p>
    <div class="actions">
      <form method="post" action="/albums/{{ album.id }}/delete">
        <button class="danger" type="submit">Delete permanently</button>
      </form>
      <a class="ghost" href="/albums/{{ album.id }}">cancel</a>
    </div>
  </div>
</body>
</html>
